name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/deepseek-v4-flash-free
          use_github_token: true
          prompt: |
            Review this pull request following Staff Engineer standards:

            ## Scope & Correctness
            - Is the change well-scoped (one CL, one thing)?
            - Logic errors, edge cases, null/exception paths
            - Race conditions or concurrency issues

            ## Security
            - Injection vulnerabilities (shell, SQL, command)
            - Hardcoded secrets or credentials
            - Unsafe file operations or deserialization

            ## Maintainability
            - Dead code, unused imports/variables
            - Error handling: are failures silent or logged?
            - Can this be simpler?

            ## Output Format
            Provide structured feedback with:
            - **Summary** (2-3 sentences)
            - **Issues Found** (by severity: CRITICAL / MAJOR / MINOR)
            - **Positive Highlights** (what was done well)

            Be concise. If nothing noteworthy, say "LGTM — no blocking issues."

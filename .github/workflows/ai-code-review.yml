name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install httpx==0.27.2

      - name: Generate diff
        env:
          BASE: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE"
          git diff "origin/$BASE...HEAD" > /tmp/pr_diff.txt
          echo "Diff size: $(wc -c < /tmp/pr_diff.txt) bytes"

      - name: Run AI Code Review
        id: review
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python .github/scripts/code_review.py /tmp/pr_diff.txt "${{ github.event.pull_request.title }}" > /tmp/review_output.md 2>&1 || ec=$?
          echo "Review exit code: ${ec:-0}"
          echo "Review output ($(wc -c < /tmp/review_output.md) bytes):"
          head -c 2000 /tmp/review_output.md
          echo "review_output=/tmp/review_output.md" >> "$GITHUB_ENV"
          exit ${ec:-0}

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.review_output, 'utf8').substring(0, 65536);
            const prNumber = context.payload.pull_request.number;

            // Delete previous AI review comments (keep latest)
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: prNumber,
            });
            const botComments = comments.filter(c =>
              c.user.type === 'Bot' && c.body.includes('## Summary')
            );
            for (const c of botComments.slice(0, -1)) {
              await github.rest.issues.deleteComment({
                ...context.repo,
                comment_id: c.id,
              });
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: prNumber,
              body,
            });
